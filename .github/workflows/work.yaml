name: Pull-request for .NET
on:
  pull_request:
    branches:
      - feature_branch
jobs:
  build_maven:
    runs-on: ubuntu-latest
    steps:
      - name: checkout Code 
        uses: actions/checkout@v6

      - name: Initialize codeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
      
      - name: build and test or package
        run: mvn --batch-mode -Dmaven.test.failure.iggnore=true test
      - name: Perform code quality analysis
        uses: github/codeql-action/analyze@v4
      - name: publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "**/target/surfire-reports/**/*.xml"
          comment_mode: always
